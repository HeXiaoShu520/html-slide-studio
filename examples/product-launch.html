<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>产品发布介绍</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
html{scroll-behavior:smooth}
body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
:root{--primary:#0066FF;--primary-light:#00D9FF;--bg:#0a0e1a;--card:#111133;--border:rgba(0,102,255,0.3);--text:#e0e0e0;--muted:#8899aa}
.page{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:60px 80px;background:var(--bg);color:var(--text);box-sizing:border-box;position:relative}
[class*="-anim"]{animation-play-state:paused}
.page.visible [class*="-anim"]{animation-play-state:running}
</style>
</head>
<body>

<div class="page">
<style>
.p1-tag{animation:p1f 0.4s ease both}
.p1-icon{animation:p1f 0.5s 0.1s ease both}
.p1-h{animation:p1u 0.6s 0.2s ease both}
.p1-sub{animation:p1u 0.6s 0.35s ease both}
.p1-stats{animation:p1u 0.6s 0.5s ease both}
@keyframes p1u{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes p1f{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,102,255,0.4)}50%{box-shadow:0 0 0 16px rgba(0,102,255,0)}}
.p1-pulse{animation:pulse 2s 1s ease-in-out infinite}
</style>
<div class="p1-tag p1-anim" style="background:rgba(0,217,255,0.1);border:1px solid rgba(0,217,255,0.3);border-radius:20px;padding:6px 18px;font-size:13px;color:var(--primary-light);margin-bottom:28px;letter-spacing:2px">NEW RELEASE · 2026</div>
<div class="p1-icon p1-anim p1-pulse" style="width:80px;height:80px;border-radius:20px;background:linear-gradient(135deg,#0066FF,#00D9FF);display:flex;align-items:center;justify-content:center;margin-bottom:28px">
  <i class="fas fa-car-side" style="font-size:2em;color:#fff"></i>
</div>
<h1 class="p1-h p1-anim" style="font-size:3em;font-weight:800;margin:0 0 12px;background:linear-gradient(135deg,#0066FF,#00D9FF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center">AutoLink Pro 3.0</h1>
<p class="p1-sub p1-anim" style="font-size:1.2em;color:var(--muted);margin:0 0 40px;text-align:center">新一代智能车联网中间件平台</p>
<div class="p1-stats p1-anim" style="display:flex;gap:16px">
  <div style="background:rgba(0,102,255,0.15);border:1px solid var(--border);border-radius:10px;padding:12px 24px;text-align:center">
    <div style="font-size:1.6em;font-weight:700;color:var(--primary-light)">3x</div>
    <div style="font-size:12px;color:var(--muted)">性能提升</div>
  </div>
  <div style="background:rgba(0,102,255,0.15);border:1px solid var(--border);border-radius:10px;padding:12px 24px;text-align:center">
    <div style="font-size:1.6em;font-weight:700;color:var(--primary-light)">50%</div>
    <div style="font-size:12px;color:var(--muted)">内存占用降低</div>
  </div>
  <div style="background:rgba(0,102,255,0.15);border:1px solid var(--border);border-radius:10px;padding:12px 24px;text-align:center">
    <div style="font-size:1.6em;font-weight:700;color:var(--primary-light)">ASIL-D</div>
    <div style="font-size:12px;color:var(--muted)">功能安全认证</div>
  </div>
</div>
</div>

<div class="page">
<style>
.p2-h{animation:p2u 0.5s ease both}
.p2-c1{animation:p2u 0.5s 0.1s ease both}
.p2-c2{animation:p2u 0.5s 0.22s ease both}
.p2-c3{animation:p2u 0.5s 0.34s ease both}
.p2-card:hover{transform:translateY(-4px);border-color:var(--primary)!important;transition:all 0.2s}
@keyframes p2u{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
</style>
<h2 class="p2-h p2-anim" style="font-size:2em;font-weight:700;margin:0 0 40px">产品亮点</h2>
<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;width:100%;max-width:960px">
  <div class="p2-card p2-c1 p2-anim" style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:32px 24px;text-align:center">
    <div style="width:56px;height:56px;border-radius:16px;background:rgba(0,102,255,0.15);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto 20px">
      <i class="fas fa-bolt" style="font-size:1.6em;color:var(--primary-light)"></i>
    </div>
    <div style="font-size:1.1em;font-weight:600;margin-bottom:10px">极致性能</div>
    <div style="font-size:13px;color:var(--muted);line-height:1.7">零拷贝消息传递，端到端延迟低至 0.1ms</div>
  </div>
  <div class="p2-card p2-c2 p2-anim" style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:32px 24px;text-align:center">
    <div style="width:56px;height:56px;border-radius:16px;background:rgba(0,102,255,0.15);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto 20px">
      <i class="fas fa-shield-alt" style="font-size:1.6em;color:var(--primary-light)"></i>
    </div>
    <div style="font-size:1.1em;font-weight:600;margin-bottom:10px">功能安全</div>
    <div style="font-size:13px;color:var(--muted);line-height:1.7">ISO 26262 ASIL-D 认证，内置冗余通信与故障隔离</div>
  </div>
  <div class="p2-card p2-c3 p2-anim" style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:32px 24px;text-align:center">
    <div style="width:56px;height:56px;border-radius:16px;background:rgba(0,102,255,0.15);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto 20px">
      <i class="fas fa-plug" style="font-size:1.6em;color:var(--primary-light)"></i>
    </div>
    <div style="font-size:1.1em;font-weight:600;margin-bottom:10px">开放生态</div>
    <div style="font-size:13px;color:var(--muted);line-height:1.7">兼容 SOME/IP、DDS、CAN FD，支持 ROS2 桥接</div>
  </div>
</div>
</div>

<div class="page">
<style>
.p3-h{animation:p3u 0.5s ease both}
.p3-s1{animation:p3l 0.4s 0.1s ease both}
.p3-s2{animation:p3l 0.4s 0.2s ease both}
.p3-s3{animation:p3l 0.4s 0.3s ease both}
.p3-s4{animation:p3l 0.4s 0.4s ease both}
.p3-s5{animation:p3l 0.4s 0.5s ease both}
.p3-s6{animation:p3l 0.4s 0.6s ease both}
@keyframes p3u{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes p3l{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
</style>
<h2 class="p3-h p3-anim" style="font-size:2em;font-weight:700;margin:0 0 40px">技术规格</h2>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:800px">
  <div class="p3-s1 p3-anim" style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 20px;display:flex;justify-content:space-between;align-items:center">
    <span style="font-size:13px;color:var(--muted)">最低延迟</span><span style="font-weight:600;color:var(--primary-light)">0.1 ms</span>
  </div>
  <div class="p3-s2 p3-anim" style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 20px;display:flex;justify-content:space-between;align-items:center">
    <span style="font-size:13px;color:var(--muted)">最大吞吐</span><span style="font-weight:600;color:var(--primary-light)">10 Gbps</span>
  </div>
  <div class="p3-s3 p3-anim" style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 20px;display:flex;justify-content:space-between;align-items:center">
    <span style="font-size:13px;color:var(--muted)">支持协议</span><span style="font-weight:600;color:var(--primary-light)">SOME/IP · DDS · CAN</span>
  </div>
  <div class="p3-s4 p3-anim" style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 20px;display:flex;justify-content:space-between;align-items:center">
    <span style="font-size:13px;color:var(--muted)">安全等级</span><span style="font-weight:600;color:var(--primary-light)">ASIL-D</span>
  </div>
  <div class="p3-s5 p3-anim" style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 20px;display:flex;justify-content:space-between;align-items:center">
    <span style="font-size:13px;color:var(--muted)">操作系统</span><span style="font-weight:600;color:var(--primary-light)">QNX · Linux · AUTOSAR</span>
  </div>
  <div class="p3-s6 p3-anim" style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 20px;display:flex;justify-content:space-between;align-items:center">
    <span style="font-size:13px;color:var(--muted)">内存占用</span><span style="font-weight:600;color:var(--primary-light)">&lt; 8 MB</span>
  </div>
</div>
</div>

<script>
const pages=[...document.querySelectorAll('.page')];
const io=new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting)e.target.classList.add('visible');
    else e.target.classList.remove('visible');
  });
},{threshold:0.4});
pages.forEach(p=>{
  io.observe(p);
  const btn=document.createElement('button');
  btn.textContent='↺';btn.title='重播动画';
  btn.style.cssText='position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;border:1px solid rgba(255,255,255,0.2);background:rgba(0,0,0,0.4);color:#fff;cursor:pointer;font-size:14px;z-index:10';
  btn.onclick=()=>{p.classList.remove('visible');void p.offsetWidth;p.classList.add('visible')};
  p.appendChild(btn);
});
</script>
</body>
</html>
